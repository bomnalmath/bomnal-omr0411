<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>봄날수학 OMR 채점</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f2ede8;
    --card: #ffffff;
    --header-bg: #1e1e1e;
    --accent: #c0392b;
    --text: #1a1a1a;
    --text-sub: #888;
    --text-muted: #aaa;
    --border: #ddd;
    --border-light: #e8e4df;
    --bubble-bg: #ede9e4;
    --bubble-border: #d0cbc5;
    --green: #2e7d5e;
    --radius: 12px;
    --font: 'Noto Sans KR', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── Header ── */
  .header { background: var(--header-bg); color: #fff; text-align: center; padding: 16px 20px 14px; }
  .header-top { font-size: 11px; color: #aaa; letter-spacing: 0.8px; margin-bottom: 4px; }
  .header-title { font-size: 18px; font-weight: 900; letter-spacing: -0.3px; }

  /* ── Name Row ── */
  .name-row { background: var(--card); border-bottom: 1px solid var(--border-light); display: flex; align-items: center; padding: 0 20px; height: 52px; }
  .name-icon { font-size: 16px; margin-right: 10px; }
  .name-input { flex: 1; border: none; outline: none; font-family: var(--font); font-size: 14px; font-weight: 500; color: var(--text); background: transparent; }
  .name-input::placeholder { color: #bbb; font-weight: 400; }
  .name-hint { font-size: 11px; color: var(--text-muted); white-space: nowrap; }

  /* ── Grade Tabs ── */
  .grade-tabs { background: var(--card); display: flex; border-bottom: 1px solid var(--border-light); position: sticky; top: 0; z-index: 50; }
  .grade-tab { flex: 1; padding: 14px 4px 12px; border: none; background: transparent; font-family: var(--font); font-size: 13px; font-weight: 600; color: var(--text-muted); cursor: pointer; border-bottom: 2.5px solid transparent; transition: all 0.18s; position: relative; bottom: -1px; }
  .grade-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── School Bar ── */
  .school-section { background: var(--card); padding: 12px 16px 14px; border-bottom: 1px solid var(--border-light); }
  .school-bar { display: flex; gap: 8px; flex-wrap: wrap; }
  .school-btn { padding: 8px 18px; border-radius: 100px; border: 1.5px solid var(--border); background: transparent; font-family: var(--font); font-size: 13px; font-weight: 600; color: var(--text-sub); cursor: pointer; transition: all 0.16s; }
  .school-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .school-btn:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

  /* ── Progress ── */
  .progress-bar { background: var(--card); padding: 8px 20px; border-bottom: 1px solid var(--border-light); text-align: center; font-size: 12px; color: var(--text-sub); font-weight: 500; }

  /* ── OMR Area ── */
  .omr-area { padding: 16px; padding-bottom: 100px; }
  .omr-card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border-light); overflow: hidden; }
  .omr-card-header { padding: 16px 20px 14px; border-bottom: 1px solid var(--border-light); }
  .omr-school-title { font-size: 17px; font-weight: 800; color: var(--text); margin-bottom: 3px; }
  .omr-school-sub { font-size: 11px; color: var(--text-muted); }
  .omr-hint { font-size: 11px; color: var(--text-muted); float: right; margin-top: -28px; line-height: 1.7; text-align: right; }

  /* ── 정답 미등록 배너 ── */
  .no-answer-banner {
    background: #fff8e1;
    border: 1.5px solid #ffe082;
    border-radius: 8px;
    padding: 10px 14px;
    margin: 12px 14px 0;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-weight: 600;
    color: #8c6d10;
  }
  .no-answer-banner.hidden { display: none; }

  /* ── Q Grid (3 columns) ── */
  .section-label {
    padding: 10px 14px 6px;
    font-size: 11px;
    font-weight: 800;
    color: var(--text-muted);
    letter-spacing: 1px;
    border-bottom: 1px solid var(--border-light);
    background: #faf9f7;
  }
  .q-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0; }
  .q-col { border-right: 1px dashed var(--border-light); padding: 8px 0; }
  .q-col:last-child { border-right: none; }
  .q-row { display: flex; align-items: center; padding: 6px 6px 6px 10px; gap: 5px; border-bottom: 1px dashed var(--border-light); transition: background 0.15s; }
  .q-row:last-child { border-bottom: none; }
  .q-row.wrong { background: #fff5f4; }
  .q-num { font-size: 12px; font-weight: 700; color: var(--text-sub); min-width: 18px; text-align: right; }
  .bubbles { display: flex; gap: 3px; }
  .bubble { width: 27px; height: 27px; border-radius: 50%; background: var(--bubble-bg); border: 1.5px solid var(--bubble-border); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #999; cursor: pointer; transition: all 0.14s; user-select: none; -webkit-tap-highlight-color: transparent; }
  .bubble:hover:not(.locked) { background: #f5e8e7; border-color: var(--accent); color: var(--accent); }
  .bubble.selected { background: #fff; border-color: var(--accent); color: var(--accent); font-weight: 900; }
  .bubble.correct-mark { background: var(--green); border-color: var(--green); color: #fff; }
  .bubble.wrong-mark { background: var(--accent); border-color: var(--accent); color: #fff; }
  .bubble.locked { cursor: default; }

  /* ── 주관식 Section ── */
  .sa-section { padding: 10px 14px 14px; }
  .sa-list { display: flex; flex-direction: column; gap: 8px; }
  .sa-row { display: flex; align-items: center; gap: 8px; }
  .sa-num {
    font-size: 12px; font-weight: 700; color: var(--text-sub);
    min-width: 30px; text-align: right; white-space: nowrap;
  }
  .sa-input-wrap { flex: 1; position: relative; }
  .sa-input {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    font-family: var(--font);
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    outline: none;
    background: #fafafa;
    transition: border-color 0.15s;
  }
  .sa-input:focus { border-color: var(--accent); background: #fff; }
  .sa-input.locked { background: #f5f5f5; pointer-events: none; color: var(--text-sub); }
  .sa-input.sa-correct { border-color: var(--green); background: #f0faf5; }
  .sa-input.sa-wrong { border-color: var(--accent); background: #fff5f4; }
  .sa-badge {
    font-size: 11px;
    font-weight: 700;
    padding: 4px 8px;
    border-radius: 20px;
    white-space: nowrap;
    min-width: 44px;
    text-align: center;
  }
  .sa-badge.correct { background: #e8f5ee; color: var(--green); }
  .sa-badge.wrong { background: #fff0ef; color: var(--accent); }
  .sa-badge.unregistered { background: #f5f5f5; color: var(--text-muted); }
  .sa-answer-hint {
    font-size: 11px;
    color: var(--accent);
    margin-top: 4px;
    margin-left: 38px;
    font-weight: 600;
  }

  /* ── Bottom Buttons ── */
  .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; display: flex; height: 64px; z-index: 100; box-shadow: 0 -2px 12px rgba(0,0,0,0.10); }
  .reset-btn { flex: 1; background: #f0ebe5; border: none; border-right: 1px solid var(--border); font-family: var(--font); font-size: 14px; font-weight: 600; color: var(--text-sub); cursor: pointer; transition: background 0.15s; }
  .reset-btn:hover { background: #e5dfda; }
  .grade-btn { flex: 2; background: var(--text); border: none; font-family: var(--font); font-size: 15px; font-weight: 800; color: #fff; cursor: pointer; letter-spacing: 0.5px; transition: background 0.15s; }
  .grade-btn:hover { background: #333; }
  .grade-btn:disabled { background: #999; cursor: default; }

  /* ── Result Sheet ── */
  .result-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: flex-end; justify-content: center; }
  .result-overlay.show { display: flex; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .result-sheet { background: var(--card); border-radius: 20px 20px 0 0; width: 100%; max-width: 640px; padding: 28px 24px 36px; animation: slideUp 0.3s ease; max-height: 85vh; overflow-y: auto; }
  @keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .result-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
  .result-meta { font-size: 13px; color: var(--text-muted); margin-bottom: 6px; }
  .result-score-row { display: flex; align-items: baseline; gap: 6px; margin-bottom: 4px; }
  .result-score { font-size: 52px; font-weight: 900; color: var(--text); line-height: 1; }
  .result-score-unit { font-size: 20px; font-weight: 700; color: var(--text-sub); }
  .result-correct-text { font-size: 14px; color: var(--text-muted); margin-bottom: 16px; }
  .result-divider { height: 1px; background: var(--border-light); margin-bottom: 14px; }
  .result-section-label { font-size: 12px; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; letter-spacing: 0.3px; }
  .wrong-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; min-height: 28px; }
  .wrong-chip { background: #fff0ef; border: 1.5px solid #f5b8b4; color: var(--accent); border-radius: 100px; padding: 4px 12px; font-size: 13px; font-weight: 700; }
  .all-correct { color: var(--green); font-weight: 800; font-size: 15px; padding: 4px 0; margin-bottom: 16px; }

  /* 주관식 결과 */
  .sa-result-list { margin-bottom: 16px; display: flex; flex-direction: column; gap: 6px; }
  .sa-result-row { display: flex; align-items: center; gap: 8px; font-size: 13px; }
  .sa-result-num { font-weight: 700; color: var(--text-sub); min-width: 32px; }
  .sa-result-student { flex: 1; color: var(--text); font-weight: 500; }
  .sa-result-answer { font-size: 11px; color: var(--text-muted); }
  .sa-result-badge { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 20px; }
  .sa-result-badge.ok { background: #e8f5ee; color: var(--green); }
  .sa-result-badge.ng { background: #fff0ef; color: var(--accent); }
  .sa-result-badge.skip { background: #f5f5f5; color: var(--text-muted); }

  .submit-notice { background: #1e1e1e; color: #fff; border-radius: 10px; padding: 14px 16px; font-size: 13px; font-weight: 600; text-align: center; margin-bottom: 12px; }
  .close-result-btn { width: 100%; padding: 13px; background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px; font-family: var(--font); font-size: 14px; font-weight: 600; color: var(--text-sub); cursor: pointer; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">봄날수학 · 2025 중간고사 대비</div>
  <div class="header-title" id="headerTitle">중1 기출문제 OMR</div>
</div>

<div class="name-row">
  <span class="name-icon">✏️</span>
  <input class="name-input" id="studentName" type="text" placeholder="이름을 입력하세요" maxlength="10">
  <span class="name-hint">결과 캡처 시 이름이 함께 표시됩니다</span>
</div>

<div class="grade-tabs">
  <button class="grade-tab active" onclick="selectGrade('중1')">중1</button>
  <button class="grade-tab" onclick="selectGrade('중2')">중2</button>
  <button class="grade-tab" onclick="selectGrade('중3-1그룹')">중3-1그룹</button>
  <button class="grade-tab" onclick="selectGrade('중3-2그룹')">중3-2그룹</button>
</div>

<div class="school-section">
  <div class="school-bar" id="schoolBar"></div>
</div>

<div class="progress-bar" id="progressBar">학교를 선택하세요</div>

<div class="omr-area">
  <div class="omr-card" id="omrCard">
    <div class="omr-card-header" id="omrCardHeader" style="display:none">
      <div class="omr-hint">①~⑤ 클릭해서 선택</div>
      <div class="omr-school-title" id="omrSchoolTitle"></div>
      <div class="omr-school-sub" id="omrSchoolSub"></div>
    </div>

    <!-- 정답 미등록 배너 -->
    <div class="no-answer-banner hidden" id="noAnswerBanner">
      ⚠️ <span id="noAnswerText">정답을 입력하세요</span>
    </div>

    <!-- 객관식 -->
    <div class="section-label hidden" id="mcLabel">객 관 식</div>
    <div class="q-grid" id="qGrid">
      <div style="grid-column:1/-1; padding:48px 20px; text-align:center; color:#bbb; font-size:14px;">
        학교를 선택하면 답안지가 표시됩니다
      </div>
    </div>

    <!-- 주관식 -->
    <div id="saSection" style="display:none">
      <div class="section-label">주 관 식</div>
      <div class="sa-section">
        <div class="sa-list" id="saList"></div>
      </div>
    </div>

  </div>
</div>

<div class="bottom-bar">
  <button class="reset-btn" onclick="resetOMR()">↺ 초기화</button>
  <button class="grade-btn" id="gradeBtn" onclick="gradeOMR()" disabled>채점하기</button>
</div>

<!-- Result Sheet -->
<div class="result-overlay" id="resultOverlay" onclick="overlayClick(event)">
  <div class="result-sheet" id="resultSheet">
    <div class="result-handle"></div>
    <div class="result-meta" id="resultMeta"></div>
    <div class="result-score-row">
      <div class="result-score" id="resultScore"></div>
      <div class="result-score-unit">점</div>
    </div>
    <div class="result-correct-text" id="resultCorrectText"></div>
    <div class="result-divider"></div>

    <div class="result-section-label">틀린 번호 (객관식)</div>
    <div class="wrong-chips" id="wrongChips"></div>

    <div id="saResultSection" style="display:none">
      <div class="result-section-label">주관식 채점 결과</div>
      <div class="sa-result-list" id="saResultList"></div>
    </div>

    <div class="submit-notice">📢 선생님께 결과를 제출하세요!</div>
    <button class="close-result-btn" onclick="closeResult()">닫기</button>
  </div>
</div>

<script>
/* ============================================================
   DATA
   mc: 객관식  { count, answers }
   sa: 주관식  { items: [{num, answer}] }   null이면 주관식 없음
   answers 빈 배열 = 정답 미등록
   ============================================================ */
const DATA = {
  '중1': [
    { name: '금호중', mc: { count:25, answers:[5,2,4,1,5,3,3,5,2,5,1,3,1,4,3,4,3,1,4,2,1,4,2,5,5] }, sa: null },
    { name: '글벗중', mc: { count:26, answers:[3,5,4,2,1,4,4,5,2,4,1,5,3,5,3,2,1,5,4,3,1,4,3,3,1,2] }, sa: null },
    { name: '고운중', mc: { count:25, answers:[1,1,5,4,5,1,3,3,2,5,2,4,4,5,3,1,1,2,5,2,3,4,2,3,4] }, sa: null },
  ],
  '중2': [
    { name: '금호중', mc: { count:25, answers:[5,4,4,2,1,4,4,3,3,2,1,2,1,2,4,3,1,1,5,1,2,4,5,3,5] }, sa: null },
    { name: '글벗중', mc: { count:25, answers:[2,4,3,1,1,5,5,1,4,3,3,2,4,3,2,4,5,2,1,4,4,1,2,5,3] }, sa: null },
    { name: '고운중', mc: { count:25, answers:[4,4,2,3,1,4,5,3,4,2,5,5,1,2,2,1,4,3,4,3,2,5,5,1,3] }, sa: null },
  ],
  '중3-1그룹': [
    {
      name: '다정중',
      mc: { count:17, answers:[1,3,5,3,5,4,2,4,3,1,1,1,3,4,1,5,1] },
      sa: {
        items: [
          { num: 18, answer: '30' },
          { num: 19, answer: '6' },
          { num: 20, answer: '4' },
          { num: 21, answer: '48' },
        ]
      }
    },
    { name: '금호중', mc: { count:25, answers:[4,2,5,4,3,1,3,2,3,4,3,5,5,4,2,5,2,1,1,2,5,2,1,5,5] }, sa: null },
    {
      name: '글벗중',
      mc: { count:22, answers:[1,2,3,5,2,1,2,1,3,3,5,5,4,4,4,4,5,4,5,2,3,1] },
      sa: {
        items: [
          { num: 23, answer: '6√5' },
          { num: 24, answer: '3' },
          { num: 25, answer: '13' },
        ]
      }
    },
  ],
  '중3-2그룹': [
    { name: '종촌중', mc: { count:24, answers:[1,5,2,1,2,4,5,1,1,2,3,5,4,2,3,1,4,5,3,4,3,3,2,5] }, sa: null },
    { name: '한솔중', mc: { count:26, answers:[3,3,5,4,2,5,1,4,1,2,3,2,5,3,2,3,1,4,5,4,1,2,1,3,5,4] }, sa: null },
    {
      name: '해밀중',
      mc: { count:23, answers:[5,3,2,4,1,3,2,3,2,4,1,4,4,2,2,5,5,4,5,3,1,1,3] },
      sa: {
        items: [
          { num: 24, answer: 'ㄷ, ㄹ, ㅂ' },
          { num: 25, answer: '2' },
        ]
      }
    },
  ],
};

const GRADE_LABELS = {
  '중1': '중1 기출문제 OMR', '중2': '중2 기출문제 OMR',
  '중3-1그룹': '중3-1그룹 기출문제 OMR', '중3-2그룹': '중3-2그룹 기출문제 OMR',
};

/* STATE */
let currentGrade  = '중1';
let currentSchool = null;
let userMCAnswers = [];   // 0 = unanswered
let userSAAnswers = [];   // string array
let graded        = false;

selectGrade('중1');

/* ============================================================ GRADE */
function selectGrade(grade) {
  currentGrade = grade;
  currentSchool = null;
  graded = false;
  document.getElementById('headerTitle').textContent = GRADE_LABELS[grade];
  document.querySelectorAll('.grade-tab').forEach((b, i) => {
    b.classList.toggle('active', ['중1','중2','중3-1그룹','중3-2그룹'][i] === grade);
  });
  renderSchools();
  clearOMR();
}

/* ============================================================ SCHOOLS */
function renderSchools() {
  const bar = document.getElementById('schoolBar');
  bar.innerHTML = '';
  DATA[currentGrade].forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'school-btn';
    btn.textContent = s.name;
    btn.onclick = () => selectSchool(s, btn);
    bar.appendChild(btn);
  });
}

function selectSchool(school, btn) {
  if (graded) return;
  currentSchool = school;
  userMCAnswers = new Array(school.mc.count).fill(0);
  userSAAnswers = school.sa ? school.sa.items.map(() => '') : [];
  document.querySelectorAll('.school-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderOMR();
  updateProgress();
}

/* ============================================================ OMR RENDER */
function clearOMR() {
  document.getElementById('omrCardHeader').style.display = 'none';
  document.getElementById('noAnswerBanner').classList.add('hidden');
  document.getElementById('mcLabel').classList.add('hidden');
  document.getElementById('saSection').style.display = 'none';
  document.getElementById('qGrid').innerHTML =
    `<div style="grid-column:1/-1;padding:48px 20px;text-align:center;color:#bbb;font-size:14px;">
      학교를 선택하면 답안지가 표시됩니다
    </div>`;
  document.getElementById('gradeBtn').disabled = true;
  document.getElementById('progressBar').textContent = '학교를 선택하세요';
}

function renderOMR() {
  const s = currentSchool;
  const header = document.getElementById('omrCardHeader');
  header.style.display = 'block';

  const mcTotal = s.mc.count;
  const saItems = s.sa ? s.sa.items : [];
  const totalQ  = mcTotal + saItems.length;

  document.getElementById('omrSchoolTitle').textContent = `${s.name} 기출문제`;
  document.getElementById('omrSchoolSub').textContent =
    `2025학년도 · 1학기중간 · 총 ${totalQ}문항` +
    (saItems.length ? ` (객관식 ${mcTotal} + 주관식 ${saItems.length})` : '');

  // 정답 미등록 배너
  const banner  = document.getElementById('noAnswerBanner');
  const noMC    = s.mc.answers.length === 0;
  const noSAArr = saItems.filter(it => it.answer === '');

  if (noMC) {
    banner.classList.remove('hidden');
    document.getElementById('noAnswerText').textContent =
      `객관식 정답을 입력하세요 (선생님 확인 필요)`;
  } else if (noSAArr.length > 0) {
    banner.classList.remove('hidden');
    const nums = noSAArr.map(it => `${it.num}번`).join(', ');
    document.getElementById('noAnswerText').textContent =
      `주관식 ${nums} 정답을 입력하세요 (선생님 확인 필요)`;
  } else {
    banner.classList.add('hidden');
  }

  // 객관식 그리드
  if (noMC) {
    document.getElementById('mcLabel').classList.add('hidden');
    document.getElementById('qGrid').innerHTML =
      `<div style="grid-column:1/-1;padding:32px 20px;text-align:center;color:#bbb;font-size:14px;">
        객관식 정답이 등록되지 않았습니다
      </div>`;
    document.getElementById('gradeBtn').disabled = true;
  } else {
    document.getElementById('mcLabel').classList.remove('hidden');
    renderMCGrid(s.mc.count);
    document.getElementById('gradeBtn').disabled = false;
  }

  // 주관식 섹션
  const saSection = document.getElementById('saSection');
  if (saItems.length > 0) {
    saSection.style.display = 'block';
    renderSASection(saItems);
  } else {
    saSection.style.display = 'none';
  }
}

/* ── MC Grid ── */
function renderMCGrid(count) {
  const col1End = Math.ceil(count / 3);
  const col2End = Math.ceil(count * 2 / 3);
  const grid = document.getElementById('qGrid');
  grid.innerHTML = '';
  [[0, col1End], [col1End, col2End], [col2End, count]].forEach(([start, end]) => {
    const col = document.createElement('div');
    col.className = 'q-col';
    for (let q = start; q < end; q++) col.appendChild(makeMCRow(q));
    grid.appendChild(col);
  });
}

function makeMCRow(q) {
  const row = document.createElement('div');
  row.className = 'q-row';
  row.id = `row-${q}`;
  const num = document.createElement('div');
  num.className = 'q-num';
  num.textContent = q + 1;
  const bubbles = document.createElement('div');
  bubbles.className = 'bubbles';
  for (let v = 1; v <= 5; v++) {
    const b = document.createElement('div');
    b.className = 'bubble';
    b.id = `b-${q}-${v}`;
    b.textContent = v;
    b.onclick = () => selectBubble(q, v);
    bubbles.appendChild(b);
  }
  row.appendChild(num);
  row.appendChild(bubbles);
  return row;
}

/* ── SA Section ── */
function renderSASection(items) {
  const list = document.getElementById('saList');
  list.innerHTML = '';
  items.forEach((it, idx) => {
    const row = document.createElement('div');
    row.className = 'sa-row';
    row.id = `sa-row-${idx}`;

    const num = document.createElement('div');
    num.className = 'sa-num';
    num.textContent = `${it.num}번`;

    const wrap = document.createElement('div');
    wrap.className = 'sa-input-wrap';

    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'sa-input';
    input.id = `sa-input-${idx}`;
    input.placeholder = '답을 입력하세요';
    input.value = userSAAnswers[idx] || '';
    input.oninput = e => { userSAAnswers[idx] = e.target.value; updateProgress(); };
    wrap.appendChild(input);

    const badge = document.createElement('div');
    badge.className = 'sa-badge';
    badge.id = `sa-badge-${idx}`;

    row.appendChild(num);
    row.appendChild(wrap);
    row.appendChild(badge);
    list.appendChild(row);
  });
}

/* ============================================================ BUBBLE */
function selectBubble(q, v) {
  if (graded) return;
  userMCAnswers[q] = (userMCAnswers[q] === v) ? 0 : v;
  for (let i = 1; i <= 5; i++) {
    const b = document.getElementById(`b-${q}-${i}`);
    if (b) b.className = 'bubble' + (userMCAnswers[q] === i ? ' selected' : '');
  }
  updateProgress();
}

/* ============================================================ PROGRESS */
function updateProgress() {
  if (!currentSchool) return;
  const mcAnswered = userMCAnswers.filter(v => v !== 0).length;
  const saAnswered = userSAAnswers.filter(v => v.trim() !== '').length;
  const mcTotal = currentSchool.mc.count;
  const saTotal = currentSchool.sa ? currentSchool.sa.items.length : 0;
  const total = mcTotal + saTotal;
  const answered = mcAnswered + saAnswered;

  if (currentSchool.mc.answers.length === 0) {
    document.getElementById('progressBar').textContent = '정답 미등록';
  } else {
    document.getElementById('progressBar').textContent = `${answered} / ${total} 답안 입력됨`;
  }
}

/* ============================================================ GRADE */
function gradeOMR() {
  const name = document.getElementById('studentName').value.trim();
  if (!name) {
    alert('이름을 입력해주세요!');
    document.getElementById('studentName').focus();
    return;
  }
  if (!currentSchool || currentSchool.mc.answers.length === 0) return;

  const mcAnswers = currentSchool.mc.answers;
  const mcTotal   = currentSchool.mc.count;
  let mcCorrect   = 0;
  const mcWrong   = [];

  // 객관식 채점
  for (let q = 0; q < mcTotal; q++) {
    const ua = userMCAnswers[q];
    const ra = mcAnswers[q];
    const ok = ua === ra;
    if (ok) mcCorrect++; else mcWrong.push(q + 1);
    for (let v = 1; v <= 5; v++) {
      const b = document.getElementById(`b-${q}-${v}`);
      if (!b) continue;
      b.className = 'bubble locked';
      if (v === ua) b.classList.add(ok ? 'correct-mark' : 'wrong-mark');
    }
    const row = document.getElementById(`row-${q}`);
    if (row && !ok) row.classList.add('wrong');
  }

  // 주관식 채점
  const saItems = currentSchool.sa ? currentSchool.sa.items : [];
  let saCorrect = 0;
  const saResults = [];

  saItems.forEach((it, idx) => {
    const input = document.getElementById(`sa-input-${idx}`);
    const badge = document.getElementById(`sa-badge-${idx}`);
    if (input) input.classList.add('locked');

    const student = (userSAAnswers[idx] || '').trim();
    const correct = it.answer.trim();

    let status;
    if (correct === '') {
      status = 'unregistered';
      if (badge) { badge.textContent = '미등록'; badge.className = 'sa-badge unregistered'; }
      if (input) input.classList.add('locked');
    } else if (student === correct) {
      status = 'correct';
      saCorrect++;
      if (badge) { badge.textContent = '정답 ✓'; badge.className = 'sa-badge correct'; }
      if (input) input.classList.add('sa-correct');
    } else {
      status = 'wrong';
      if (badge) { badge.textContent = '오답 ✗'; badge.className = 'sa-badge wrong'; }
      if (input) input.classList.add('sa-wrong');
      // 오답 시 정답 힌트 표시
      const wrap = input.parentNode;
      const hint = document.createElement('div');
      hint.className = 'sa-answer-hint';
      hint.textContent = `정답: ${correct}`;
      wrap.appendChild(hint);
    }
    saResults.push({ num: it.num, student, correct, status });
  });

  graded = true;
  document.getElementById('gradeBtn').disabled = true;

  // 점수 계산 (객관식 기준)
  const mcScore = Math.round((mcCorrect / mcTotal) * 100);
  showResult(name, mcScore, mcCorrect, mcTotal, mcWrong, saResults, saCorrect);
}

/* ============================================================ RESULT */
function showResult(name, score, mcCorrect, mcTotal, mcWrong, saResults, saCorrect) {
  document.getElementById('resultMeta').textContent =
    `${name} 학생 · ${currentGrade} ${currentSchool.name}`;
  document.getElementById('resultScore').textContent = score;

  let correctText = `객관식 ${mcTotal}문항 중 ${mcCorrect}문항 정답`;
  if (saResults.length > 0) correctText += ` · 주관식 ${saResults.length}문항`;
  document.getElementById('resultCorrectText').textContent = correctText;

  // 객관식 틀린 번호
  const chips = document.getElementById('wrongChips');
  chips.innerHTML = '';
  if (mcWrong.length === 0) {
    chips.innerHTML = '<span class="all-correct">🎉 객관식 모두 정답!</span>';
  } else {
    mcWrong.forEach(n => {
      const c = document.createElement('span');
      c.className = 'wrong-chip';
      c.textContent = `${n}번`;
      chips.appendChild(c);
    });
  }

  // 주관식 결과
  const saResultSection = document.getElementById('saResultSection');
  if (saResults.length > 0) {
    saResultSection.style.display = 'block';
    const list = document.getElementById('saResultList');
    list.innerHTML = '';
    saResults.forEach(r => {
      const row = document.createElement('div');
      row.className = 'sa-result-row';
      row.innerHTML = `
        <span class="sa-result-num">${r.num}번</span>
        <span class="sa-result-student">${r.student || '(미입력)'}</span>
        ${r.status === 'correct' ? `<span class="sa-result-badge ok">정답 ✓</span>` :
          r.status === 'wrong'   ? `<span class="sa-result-badge ng">오답 ✗</span><span class="sa-result-answer">정답: ${r.correct}</span>` :
                                   `<span class="sa-result-badge skip">미등록</span>`}
      `;
      list.appendChild(row);
    });
  } else {
    saResultSection.style.display = 'none';
  }

  document.getElementById('resultOverlay').classList.add('show');
}

function closeResult() {
  document.getElementById('resultOverlay').classList.remove('show');
}
function overlayClick(e) {
  if (e.target === document.getElementById('resultOverlay')) closeResult();
}

/* ============================================================ RESET */
function resetOMR() {
  if (!currentSchool) return;
  if (!confirm('답안을 초기화할까요?')) return;
  graded = false;
  userMCAnswers = new Array(currentSchool.mc.count).fill(0);
  userSAAnswers = currentSchool.sa ? currentSchool.sa.items.map(() => '') : [];
  renderOMR();
  updateProgress();
  document.getElementById('gradeBtn').disabled = currentSchool.mc.answers.length === 0;
  document.getElementById('resultOverlay').classList.remove('show');
}
</script>
