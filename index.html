<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>봄날수학 OMR 채점</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: #f0ece6; min-height: 100vh; }

  .wrap { max-width: 480px; margin: 0 auto; padding: 52px 20px 64px; }

  .brand {
    display: inline-block;
    background: #e4dbd2; color: #7a6250;
    font-size: 12px; font-weight: 700;
    padding: 6px 16px; border-radius: 100px;
    margin-bottom: 22px; letter-spacing: 0.3px;
  }

  .title {
    font-size: 36px; font-weight: 900;
    line-height: 1.2; color: #1a2744;
    letter-spacing: -1.5px; margin-bottom: 10px;
  }
  .title em { color: #c0392b; font-style: normal; }

  .subtitle { font-size: 14px; color: #9aabb8; line-height: 1.7; margin-bottom: 36px; }
  .section-hint { font-size: 11px; font-weight: 700; color: #b8c4cc; letter-spacing: 1.5px; margin-bottom: 14px; }

  /* 2x2 그리드 */
  .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .card {
    background: #fff; border-radius: 16px;
    padding: 20px 16px 18px;
    display: flex; flex-direction: column; gap: 10px;
    text-decoration: none;
    box-shadow: 0 2px 12px rgba(30,40,80,0.06);
    border: 1.5px solid #e8ecf0;
    transition: all 0.2s;
    position: relative; overflow: hidden;
  }
  .card::before {
    content: ''; position: absolute;
    top: 0; left: 0; right: 0; height: 4px;
    background: var(--c); border-radius: 16px 16px 0 0;
  }
  .card:hover { transform: translateY(-3px); box-shadow: 0 8px 22px rgba(30,40,80,0.12); border-color: var(--c); }
  .card:active { transform: translateY(0); }

  .card-grade { font-size: 11px; font-weight: 700; color: var(--c); }
  .card-name { font-size: 28px; font-weight: 900; color: #1a2744; letter-spacing: -1px; line-height: 1; }
  .card-schools { font-size: 11px; color: #aabbc8; line-height: 1.7; }
  .card-arrow { font-size: 12px; color: var(--c); opacity: 0.8; font-weight: 700; margin-top: 2px; }

  .footer { text-align: center; margin-top: 36px; font-size: 11px; color: #c0c8d0; }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">봄날수학</div>
  <div class="title">2025 중간고사<br><em>OMR 채점</em></div>
  <div class="subtitle">학년을 선택하면<br>바로 채점을 시작할 수 있어요</div>
  <div class="section-hint">▸ 학 년 선 택</div>

  <div class="cards">
    <a class="card" href="omr_1.html" style="--c:#d4956a">
      <div class="card-grade">중학교 1학년</div>
      <div class="card-name">중 1</div>
      <div class="card-schools">금호중 · 글벗중<br>고운중</div>
      <div class="card-arrow">채점 시작 →</div>
    </a>
    <a class="card" href="omr_2.html" style="--c:#3b82f6">
      <div class="card-grade">중학교 2학년</div>
      <div class="card-name">중 2</div>
      <div class="card-schools">금호중 · 글벗중<br>고운중</div>
      <div class="card-arrow">채점 시작 →</div>
    </a>
    <a class="card" href="omr_3a.html" style="--c:#22c55e">
      <div class="card-grade">중학교 3학년 · A</div>
      <div class="card-name">중3 A</div>
      <div class="card-schools">다정중 · 금호중<br>글벗중</div>
      <div class="card-arrow">채점 시작 →</div>
    </a>
    <a class="card" href="omr_3b.html" style="--c:#a855f7">
      <div class="card-grade">중학교 3학년 · B</div>
      <div class="card-name">중3 B</div>
      <div class="card-schools">종촌중 · 한솔중<br>해밀중</div>
      <div class="card-arrow">채점 시작 →</div>
    </a>
  </div>
  <div class="footer">봄날수학 · 세종시 · 2025</div>
</div>
</body>
</html>
